  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n    --ash-600:#26282d;\n    --line:rgba(255,255,255,.085);\n    --line-2:rgba(255,255,255,.14);\n    --text:#f2f3f4;\n    --dim:#a6a9ad;\n    --faint:#6c6f74;\n    --silver:linear-gradient(168deg,#ffffff 0%,#d6d8dc 34%,#8e9197 52%,#c3c5c9 70%,#f3f4f5 100%);\n    --maxw:1180px;\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  html{scroll-behavior:smooth}\n  body{\n    background:var(--ash-950);\n    color:var(--text);\n    font-family:\"Space Grotesk\",sans-serif;\n    line-height:1.5;\n    -webkit-font-smoothing:antialiased;\n    letter-spacing:-.01em;\n    background-image:radial-gradient(120% 80% at 50% -10%,rgba(255,255,255,.05),transparent 60%);\n    background-repeat:no-repeat;\n  }\n  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 32px}\n\n  /* ---------- shared bits ---------- */\n  .mono{font-family:\"Space Mono\",monospace;letter-spacing:0}\n  .kicker{\n    font-family:\"Space Mono\",monospace;font-size:11px;letter-spacing:.28em;\n    text-transform:uppercase;color:var(--faint);\n  }\n  .chrome{\n    background:var(--silver);\n    -webkit-background-clip:text;background-clip:text;\n    -webkit-text-fill-color:transparent;color:transparent;\n  }\n  .logo{font-family:\"UnifrakturCook\",serif;font-weight:700;letter-spacing:.01em}\n\n  /* ---------- doc header ---------- */\n  .docbar{\n    position:sticky;top:0;z-index:50;\n    display:flex;align-items:center;justify-content:space-between;\n    padding:18px 32px;\n    background:rgba(8,8,10,.72);backdrop-filter:blur(14px);\n    border-bottom:1px solid var(--line);\n  }\n  .docbar .logo{font-size:21px;line-height:1.3;color:#e9eaec;white-space:nowrap;flex-shrink:0}\n  .docbar .tag{display:flex;gap:18px;align-items:center}\n  .pill{\n    font-family:\"Space Mono\",monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;\n    color:var(--dim);border:1px solid var(--line-2);border-radius:999px;padding:6px 12px;\n  }\n\n  /* ---------- hero of the doc ---------- */\n  .doc-hero{padding:90px 0 64px;border-bottom:1px solid var(--line)}\n  .doc-hero h1{\n    font-size:clamp(40px,7vw,84px);line-height:.98;font-weight:600;letter-spacing:-.03em;\n    margin:22px 0 0;\n  }\n  .doc-hero p.lede{\n    max-width:620px;margin-top:24px;color:var(--dim);font-size:18px;line-height:1.6;\n  }\n  .meta-row{display:flex;flex-wrap:wrap;gap:40px;margin-top:44px}\n  .meta-row .cell{min-width:120px}\n  .meta-row .cell .k{font-family:\"Space Mono\",monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}\n  .meta-row .cell .v{font-size:15px;color:var(--text)}\n\n  /* ---------- section scaffolding ---------- */\n  section.block{padding:84px 0;border-bottom:1px solid var(--line)}\n  .sec-head{display:flex;align-items:baseline;gap:18px;margin-bottom:40px}\n  .sec-head .num{font-family:\"Space Mono\",monospace;font-size:13px;color:var(--faint)}\n  .sec-head h2{font-size:clamp(24px,3.4vw,34px);font-weight:600;letter-spacing:-.02em}\n  .sec-head .h-note{margin-left:auto;color:var(--faint);font-family:\"Space Mono\",monospace;font-size:11px;letter-spacing:.08em;align-self:center}\n\n  .lead-copy{max-width:680px;color:var(--dim);font-size:16.5px;line-height:1.7;margin-bottom:8px}\n  .lead-copy strong{color:var(--text);font-weight:500}\n\n  /* ---------- design system ---------- */\n  .grid{display:grid;gap:18px}\n  .card{\n    background:linear-gradient(180deg,var(--ash-850),var(--ash-900));\n    border:1px solid var(--line);border-radius:16px;padding:26px;\n  }\n  .card .c-label{font-family:\"Space Mono\",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin-bottom:18px}\n\n  .swatches{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px}\n  .sw{border-radius:12px;border:1px solid var(--line);overflow:hidden}\n  .sw .chip{height:64px}\n  .sw .info{padding:9px 10px;font-family:\"Space Mono\",monospace;font-size:10px;line-height:1.5}\n  .sw .info .nm{color:var(--text)}\n  .sw .info .hx{color:var(--faint)}\n\n  .type-row{padding:18px 0;border-bottom:1px solid var(--line)}\n  .type-row:last-child{border-bottom:0}\n  .type-row .tag{font-family:\"Space Mono\",monospace;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:10px}\n  .specimen-display{font-size:46px;font-weight:600;letter-spacing:-.02em}\n  .specimen-mono{font-family:\"Space Mono\",monospace;font-size:20px}\n  .specimen-black{font-family:\"UnifrakturCook\",serif;font-size:52px}\n\n  .chrome-demo{\n    border-radius:16px;border:1px solid var(--line);\n    background:\n      radial-gradient(120% 140% at 50% 0%,rgba(255,255,255,.07),transparent 55%),\n      linear-gradient(180deg,#141518,#0b0c0e);\n    padding:48px;display:flex;align-items:center;justify-content:center;gap:30px;flex-wrap:wrap;\n  }\n  .chrome-word{font-size:64px;font-weight:700;letter-spacing:-.03em}\n\n  /* ---------- buttons ---------- */\n  .btn{\n    display:inline-flex;align-items:center;gap:9px;\n    font-family:\"Space Grotesk\",sans-serif;font-weight:600;font-size:15px;\n    padding:14px 22px;border-radius:12px;border:1px solid transparent;cursor:pointer;\n    text-decoration:none;letter-spacing:-.01em;\n  }\n  .btn-silver{background:var(--silver);color:#0a0a0b;box-shadow:0 1px 0 rgba(255,255,255,.4) inset,0 10px 30px rgba(0,0,0,.5)}\n  .btn-ghost{background:transparent;color:var(--text);border-color:var(--line-2)}\n\n  /* ---------- wireframe ---------- */\n  .wf-intro{display:flex;gap:14px;align-items:center;margin-bottom:30px;color:var(--faint);font-family:\"Space Mono\",monospace;font-size:11.5px;letter-spacing:.06em;flex-wrap:wrap}\n  .wf-legend{display:flex;gap:18px;flex-wrap:wrap}\n  .wf-legend span{display:inline-flex;align-items:center;gap:7px}\n  .dotbox{width:13px;height:13px;border:1px dashed var(--line-2);border-radius:3px;display:inline-block}\n  .dotfill{width:13px;height:13px;border-radius:3px;background:var(--silver);display:inline-block}\n\n  .frame{\n    display:grid;grid-template-columns:54px 1fr;gap:0;\n    border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-bottom:22px;\n    background:var(--ash-900);\n  }\n  .frame .rail{\n    background:linear-gradient(180deg,var(--ash-850),var(--ash-900));\n    border-right:1px solid var(--line);\n    display:flex;align-items:center;justify-content:center;\n  }\n  .frame .rail .rt{\n    writing-mode:vertical-rl;transform:rotate(180deg);\n    font-family:\"Space Mono\",monospace;font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--faint);\n  }\n  .frame .canvas{padding:30px}\n  .frame .annot{\n    padding:14px 30px;border-top:1px dashed var(--line);\n    font-family:\"Space Mono\",monospace;font-size:11.5px;color:var(--dim);line-height:1.6;\n  }\n  .frame .annot b{color:var(--text);font-weight:400;background:rgba(255,255,255,.06);padding:1px 6px;border-radius:4px}\n\n  /* placeholder primitives */\n  .ph{\n    border:1px dashed var(--line-2);border-radius:10px;\n    background:\n      repeating-linear-gradient(135deg,rgba(255,255,255,.025) 0 8px,transparent 8px 16px);\n    display:flex;align-items:center;justify-content:center;\n    font-family:\"Space Mono\",monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);\n    text-align:center;padding:14px;\n  }\n  .bar{height:14px;border-radius:5px;background:var(--ash-600)}\n  .bar.lg{height:26px}\n  .bar.sil{background:var(--silver)}\n  .stack{display:flex;flex-direction:column;gap:12px}\n  .row{display:flex;gap:14px}\n  .center{align-items:center;justify-content:center}\n  .pill-ph{height:42px;border-radius:10px;border:1px dashed var(--line-2);display:flex;align-items:center;justify-content:center;font-family:\"Space Mono\",monospace;font-size:11px;color:var(--faint)}\n\n  /* wireframe: nav */\n  .wf-nav{display:flex;align-items:center;justify-content:space-between;padding:6px 4px}\n  .wf-nav .ll{font-family:\"UnifrakturCook\",serif;font-size:22px;color:#cfd1d4}\n  .wf-nav .links{display:flex;gap:22px}\n  .wf-nav .links .bar{width:54px}\n\n  .footnote{color:var(--faint);font-family:\"Space Mono\",monospace;font-size:11.5px;margin-top:6px;line-height:1.7}\n\n  /* next steps */\n  .steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;counter-reset:s}\n  .step{background:linear-gradient(180deg,var(--ash-850),var(--ash-900));border:1px solid var(--line);border-radius:14px;padding:22px}\n  .step .n{font-family:\"Space Mono\",monospace;color:var(--faint);font-size:12px;margin-bottom:10px}\n  .step h4{font-size:16px;font-weight:600;margin-bottom:6px}\n  .step p{color:var(--dim);font-size:13.5px;line-height:1.6}\n\n  .end-cta{padding:90px 0 110px;text-align:center}\n  .end-cta h3{font-size:clamp(26px,4vw,40px);font-weight:600;letter-spacing:-.02em;margin-bottom:14px}\n  .end-cta p{color:var(--dim);max-width:480px;margin:0 auto 30px}\n\n  @media(max-width:720px){\n    .wrap{padding:0 20px}\n    .docbar{padding:14px 20px}\n    .frame{grid-template-columns:1fr}\n    .frame .rail{flex-direction:row;border-right:0;border-bottom:1px solid var(--line);padding:8px}\n    .frame .rail .rt{writing-mode:horizontal-tb;transform:none}\n    .meta-row{gap:26px}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"docbar\">\n  <div class=\"logo\">Lock In<\u002Fdiv>\n  <div class=\"tag\">\n    <span class=\"pill\">Website Scheme<\u002Fspan>\n    <span class=\"pill\">v1 · for review<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- DOC HERO -->\n<header class=\"doc-hero\">\n  <div class=\"wrap\">\n    <div class=\"kicker\">Landing page · focus &amp; deep-work app · drive downloads<\u002Fdiv>\n    <h1>The scheme for<br><span class=\"chrome\">Lock In.<\u002Fspan><\u002Fh1>\n    <p class=\"lede\">A wireframe and design system for your review — before I build the full clickable page. Here's how I'm reading the brief, the visual system I'd use, and the structure of the page. Tell me what to change.<\u002Fp>\n    <div class=\"meta-row\">\n      <div class=\"cell\"><div class=\"k\">Product<\u002Fdiv><div class=\"v\">Focus / deep-work app<\u002Fdiv><\u002Fdiv>\n      <div class=\"cell\"><div class=\"k\">Goal<\u002Fdiv><div class=\"v\">App downloads<\u002Fdiv><\u002Fdiv>\n      <div class=\"cell\"><div class=\"k\">Tone<\u002Fdiv><div class=\"v\">Refined · high-end · dark<\u002Fdiv><\u002Fdiv>\n      <div class=\"cell\"><div class=\"k\">Accent<\u002Fdiv><div class=\"v\">Monochrome silver<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- 00 — READING THE BRIEF -->\n<section class=\"block\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\"><span class=\"num\">00<\u002Fspan><h2>How I'm reading this<\u002Fh2><span class=\"h-note\">design reasoning<\u002Fspan><\u002Fdiv>\n    <p class=\"lead-copy\">The image does a lot of work already: a <strong>chrome chess rook<\u002Fstrong> floating in ashy near-black, with <strong>“LOCK IN”<\u002Fstrong> set in blackletter. That's a strong, premium identity — heavy, focused, a little defiant. My job is to build a page that feels like an extension of that frame, not a busier version of it.<\u002Fp>\n    <p class=\"lead-copy\" style=\"margin-top:18px\">So the strategy is <strong>restraint<\u002Fstrong>. Lots of black. Generous negative space. One material — polished silver — used like a precious metal, not a paint. Type is clean and quiet so the chrome and the rook stay the loudest things on screen. The whole page should feel like one continuous dark room you scroll through, where light catches metal here and there.<\u002Fp>\n    <p class=\"lead-copy\" style=\"margin-top:18px\">The hero image is small (736×414), so I'll treat it as a <strong>contained centerpiece framed in darkness<\u002Fstrong> rather than a stretched full-bleed background — that keeps it crisp and makes the rook feel like an object on a pedestal.<\u002Fp>\n    <p class=\"footnote\">Big idea: <span style=\"color:var(--text)\">“Lock In” = the ritual of focus.<\u002Fspan> The site sells a feeling — closing the door on the noise — more than a feature list.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 01 — DESIGN SYSTEM -->\n<section class=\"block\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\"><span class=\"num\">01<\u002Fspan><h2>Design system<\u002Fh2><span class=\"h-note\">tokens &amp; treatment<\u002Fspan><\u002Fdiv>\n\n    <div class=\"grid\" style=\"grid-template-columns:1fr;gap:18px\">\n\n      <!-- colors -->\n      <div class=\"card\">\n        <div class=\"c-label\">Palette — ash &amp; silver, monochrome<\u002Fdiv>\n        <div class=\"swatches\">\n          <div class=\"sw\"><div class=\"chip\" style=\"background:#08080a\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Ash 950<\u002Fdiv><div class=\"hx\">#08080A<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\"><div class=\"chip\" style=\"background:#0b0c0e\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Ash 900<\u002Fdiv><div class=\"hx\">#0B0C0E<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\"><div class=\"chip\" style=\"background:#141518\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Ash 800<\u002Fdiv><div class=\"hx\">#141518<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\"><div class=\"chip\" style=\"background:#26282d\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Ash 600<\u002Fdiv><div class=\"hx\">#26282D<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\"><div class=\"chip\" style=\"background:linear-gradient(168deg,#fff,#d6d8dc 34%,#8e9197 52%,#c3c5c9 70%,#f3f4f5)\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Silver<\u002Fdiv><div class=\"hx\">chrome grad<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\"><div class=\"chip\" style=\"background:#f2f3f4\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Text<\u002Fdiv><div class=\"hx\">#F2F3F4<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\"><div class=\"chip\" style=\"background:#a6a9ad\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Dim<\u002Fdiv><div class=\"hx\">#A6A9AD<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\"><div class=\"chip\" style=\"background:#6c6f74\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Faint<\u002Fdiv><div class=\"hx\">#6C6F74<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"footnote\">No hue. The only “color” is the metallic gradient — reserved for the wordmark, key headlines, and the primary button.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- type -->\n      <div class=\"card\">\n        <div class=\"c-label\">Type — blackletter mark · grotesk · mono<\u002Fdiv>\n        <div class=\"type-row\">\n          <div class=\"tag\">Logo / wordmark — UnifrakturCook<\u002Fdiv>\n          <div class=\"specimen-black chrome\">Lock In<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"type-row\">\n          <div class=\"tag\">Display &amp; UI — Space Grotesk<\u002Fdiv>\n          <div class=\"specimen-display\">Close the door. Begin.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"type-row\">\n          <div class=\"tag\">Labels, stats, system text — Space Mono<\u002Fdiv>\n          <div class=\"specimen-mono\">02:14:08 — SESSION IN PROGRESS<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- chrome treatment -->\n      <div class=\"card\">\n        <div class=\"c-label\">Signature treatment — polished chrome on ash<\u002Fdiv>\n        <div class=\"chrome-demo\">\n          <span class=\"chrome-word chrome\">LOCK IN<\u002Fspan>\n          <a class=\"btn btn-silver\" href=\"#\">Download for iOS<\u002Fa>\n          <a class=\"btn btn-ghost\" href=\"#\">See how it works<\u002Fa>\n        <\u002Fdiv>\n        <p class=\"footnote\">Silver appears as: clipped-text headlines, the primary CTA, thin metallic rules, and the rook itself. Everything else is matte black + grey type.<\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 02 — PAGE ARCHITECTURE / WIREFRAME -->\n<section class=\"block\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\"><span class=\"num\">02<\u002Fspan><h2>Page architecture<\u002Fh2><span class=\"h-note\">low-fi wireframe<\u002Fspan><\u002Fdiv>\n    <div class=\"wf-intro\">\n      <span>WIREFRAME — layout intent only, not final visuals<\u002Fspan>\n      <span class=\"wf-legend\">\n        <span><span class=\"dotbox\"><\u002Fspan> placeholder / media<\u002Fspan>\n        <span><span class=\"dotfill\"><\u002Fspan> silver / primary action<\u002Fspan>\n      <\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- NAV -->\n    <div class=\"frame\">\n      <div class=\"rail\"><span class=\"rt\">Nav<\u002Fspan><\u002Fdiv>\n      <div class=\"canvas\">\n        <div class=\"wf-nav\">\n          <div class=\"ll\">Lock In<\u002Fdiv>\n          <div class=\"links\"><div class=\"bar\"><\u002Fdiv><div class=\"bar\"><\u002Fdiv><div class=\"bar\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"pill-ph\" style=\"width:120px\">Download ↓<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"annot\">Sticky, transparent → blurs to ash on scroll. Links: <b>Features<\u002Fb> <b>How it works<\u002Fb> <b>Pricing<\u002Fb> · right-aligned <b>Download<\u002Fb> button (silver).<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- HERO -->\n    <div class=\"frame\">\n      <div class=\"rail\"><span class=\"rt\">Hero<\u002Fspan><\u002Fdiv>\n      <div class=\"canvas\">\n        <div class=\"ph\" style=\"height:300px;flex-direction:column;gap:14px\">\n          <div>THE IMAGE — chrome rook + “LOCK IN”, framed in dark<\u002Fdiv>\n          <div class=\"row center\" style=\"margin-top:6px\">\n            <div class=\"pill-ph\" style=\"width:150px;background:var(--silver);border:0;color:#0a0a0b\">Download for iOS<\u002Fdiv>\n            <div class=\"pill-ph\" style=\"width:130px\">Watch the ritual<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"annot\">Full-height. Image as contained centerpiece. One line of <b>sub-headline<\u002Fb> beneath, two CTAs. Subtle scroll cue. App Store / Play badges.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- MANIFESTO -->\n    <div class=\"frame\">\n      <div class=\"rail\"><span class=\"rt\">Manifesto<\u002Fspan><\u002Fdiv>\n      <div class=\"canvas\">\n        <div class=\"stack center\" style=\"text-align:center;gap:16px;padding:18px 0\">\n          <div class=\"bar lg\" style=\"width:78%\"><\u002Fdiv>\n          <div class=\"bar lg\" style=\"width:64%\"><\u002Fdiv>\n          <div class=\"bar\" style=\"width:40%\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"annot\">One big statement of intent — large chrome-clipped headline + short line. Pure typography, max negative space. The “why”.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FEATURES -->\n    <div class=\"frame\">\n      <div class=\"rail\"><span class=\"rt\">Features<\u002Fspan><\u002Fdiv>\n      <div class=\"canvas\">\n        <div class=\"row\" style=\"gap:16px\">\n          <div class=\"stack\" style=\"flex:1;gap:10px\"><div class=\"ph\" style=\"height:60px\">ICON<\u002Fdiv><div class=\"bar\" style=\"width:60%\"><\u002Fdiv><div class=\"bar\" style=\"width:90%;height:10px\"><\u002Fdiv><div class=\"bar\" style=\"width:80%;height:10px\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"stack\" style=\"flex:1;gap:10px\"><div class=\"ph\" style=\"height:60px\">ICON<\u002Fdiv><div class=\"bar\" style=\"width:60%\"><\u002Fdiv><div class=\"bar\" style=\"width:90%;height:10px\"><\u002Fdiv><div class=\"bar\" style=\"width:80%;height:10px\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"stack\" style=\"flex:1;gap:10px\"><div class=\"ph\" style=\"height:60px\">ICON<\u002Fdiv><div class=\"bar\" style=\"width:60%\"><\u002Fdiv><div class=\"bar\" style=\"width:90%;height:10px\"><\u002Fdiv><div class=\"bar\" style=\"width:80%;height:10px\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"annot\">Three pillars: <b>Sessions<\u002Fb> (the timer/ritual) · <b>Streaks &amp; stats<\u002Fb> · <b>Block the noise<\u002Fb>. Thin line icons, mono labels, lots of air between rows.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- APP PREVIEW -->\n    <div class=\"frame\">\n      <div class=\"rail\"><span class=\"rt\">App preview<\u002Fspan><\u002Fdiv>\n      <div class=\"canvas\">\n        <div class=\"row\" style=\"gap:18px;align-items:stretch\">\n          <div class=\"stack\" style=\"flex:1.1;gap:12px;justify-content:center\"><div class=\"bar lg\" style=\"width:70%\"><\u002Fdiv><div class=\"bar\" style=\"width:92%;height:11px\"><\u002Fdiv><div class=\"bar\" style=\"width:84%;height:11px\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"ph\" style=\"flex:.9;height:240px\">PHONE MOCKUP — live timer / dashboard UI<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"annot\">Show the actual product. Mocked phone with the focus timer + a stats dashboard. Copy alternates left/right as you scroll (2–3 beats).<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- STATS -->\n    <div class=\"frame\">\n      <div class=\"rail\"><span class=\"rt\">Proof<\u002Fspan><\u002Fdiv>\n      <div class=\"canvas\">\n        <div class=\"row\" style=\"gap:16px\">\n          <div class=\"ph\" style=\"flex:1;height:78px\">1.2M hrs locked<\u002Fdiv>\n          <div class=\"ph\" style=\"flex:1;height:78px\">★ 4.9 rating<\u002Fdiv>\n          <div class=\"ph\" style=\"flex:1;height:78px\">200k+ users<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"annot\">A quiet band of big mono numbers + a couple of short testimonials. Credibility without clutter.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FINAL CTA -->\n    <div class=\"frame\">\n      <div class=\"rail\"><span class=\"rt\">Download<\u002Fspan><\u002Fdiv>\n      <div class=\"canvas\">\n        <div class=\"stack center\" style=\"text-align:center;gap:14px;padding:14px 0\">\n          <div class=\"bar lg\" style=\"width:55%\"><\u002Fdiv>\n          <div class=\"row center\"><div class=\"pill-ph\" style=\"width:150px;background:var(--silver);border:0;color:#0a0a0b\">Download for iOS<\u002Fdiv><div class=\"pill-ph\" style=\"width:140px\">Get on Android<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"annot\">The rook returns, smaller. Final push to <b>download<\u002Fb>. Store badges + maybe a QR for desktop visitors.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FOOTER -->\n    <div class=\"frame\" style=\"margin-bottom:0\">\n      <div class=\"rail\"><span class=\"rt\">Footer<\u002Fspan><\u002Fdiv>\n      <div class=\"canvas\">\n        <div class=\"wf-nav\">\n          <div class=\"ll\">Lock In<\u002Fdiv>\n          <div class=\"links\"><div class=\"bar\"><\u002Fdiv><div class=\"bar\"><\u002Fdiv><div class=\"bar\"><\u002Fdiv><div class=\"bar\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"annot\">Minimal. Wordmark, nav columns, socials, legal. Same ash, a single hairline at top.<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 03 — NEXT -->\n<section class=\"block\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\"><span class=\"num\">03<\u002Fspan><h2>What happens next<\u002Fh2><span class=\"h-note\">build plan<\u002Fspan><\u002Fdiv>\n    <div class=\"steps\">\n      <div class=\"step\"><div class=\"n\">→ 01<\u002Fdiv><h4>You react<\u002Fh4><p>Tell me what's wrong: sections to add/cut, the tone, the order, the accent decision.<\u002Fp><\u002Fdiv>\n      <div class=\"step\"><div class=\"n\">→ 02<\u002Fdiv><h4>I build the hero<\u002Fh4><p>Full-fidelity hero with the real image, type, and motion — shown to you fast.<\u002Fp><\u002Fdiv>\n      <div class=\"step\"><div class=\"n\">→ 03<\u002Fdiv><h4>I build the full page<\u002Fh4><p>Every section above, fully interactive: scroll reveals, hover states, working nav.<\u002Fp><\u002Fdiv>\n      <div class=\"step\"><div class=\"n\">→ 04<\u002Fdiv><h4>We iterate<\u002Fh4><p>Tweak panel for fonts, spacing, and copy so you can dial it in yourself.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- END CTA -->\n<section class=\"end-cta\">\n  <div class=\"wrap\">\n    <div class=\"kicker\" style=\"display:block;margin-bottom:18px\">Your move<\u002Fdiv>\n    <h3>Approve the scheme, or tell me what to change.<\u002Fh3>\n    <p>Once you're happy with the structure and system, I'll build the full clickable landing page.<\u002Fp>\n    <div class=\"logo chrome\" style=\"font-size:40px;margin-top:10px\">Lock In<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<script>\n  // subtle: solidify docbar on scroll\n  const bar=document.querySelector('.docbar');\n  addEventListener('scroll',()=>{bar.style.borderBottomColor=scrollY>20?'rgba(255,255,255,.14)':'rgba(255,255,255,.085)';});\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
